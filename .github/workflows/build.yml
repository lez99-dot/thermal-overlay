name: Android Build Workflow

on:
  push:
    branches: [ "main", "master", "dev" ]
    tags:
      - '*'
  pull_request:
    branches: [ "main", "master", "dev" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java Development Kit (JDK) 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Restore or generate debug keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "debug.keystore restored successfully from base64"
        else
          echo "debug.keystore.base64 not found! Generating a temporary debug keystore for compilation..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make Gradle executable
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build Debug Application Package (APK)
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --stacktrace
        else
          gradle assembleDebug --stacktrace
        fi

    - name: Rename APK for release
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Thermal-Overlay.apk

    - name: Archive Build Artifact (Debug APK)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/Thermal-Overlay.apk

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/Thermal-Overlay.apk
        name: "Thermal overlay ${{ github.ref_name }}"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

